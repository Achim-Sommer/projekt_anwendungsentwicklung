<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projekt Anwendungsentwicklung</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        color-scheme: dark;
        --bg-deep: #050911;
        --bg-mid: #101a2f;
        --accent: #34d399;
        --accent-2: #22d3ee;
        --text-main: #f8fafc;
        --text-sub: #94a3b8;
      }

      body {
        background:
          radial-gradient(circle at 12% 18%, rgba(52, 211, 153, 0.16), transparent 32%),
          radial-gradient(circle at 88% 78%, rgba(34, 211, 238, 0.12), transparent 34%),
          linear-gradient(140deg, var(--bg-deep) 0%, var(--bg-mid) 56%, #0a1222 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        overflow: hidden;
      }

      #name-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        background: rgba(3, 8, 15, 0.74);
        backdrop-filter: blur(6px);
        z-index: 999;
      }

      #name-overlay.hidden {
        display: none;
      }

      .name-card {
        width: min(92vw, 460px);
        max-height: min(92vh, 520px);
        background: linear-gradient(160deg, rgba(13, 23, 34, 0.95), rgba(10, 18, 30, 0.97));
        border: 1px solid rgba(52, 211, 153, 0.26);
        border-radius: 18px;
        padding: 24px;
        overflow: auto;
        box-shadow:
          0 20px 55px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(34, 211, 238, 0.14) inset;
      }

      .name-card h1 {
        font-size: clamp(20px, 4.3vw, 28px);
        color: var(--text-main);
        margin-bottom: 10px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .name-card p {
        color: var(--text-sub);
        font-size: clamp(12px, 2.3vw, 14px);
        margin-bottom: 16px;
        line-height: 1.4;
      }

      #name-input {
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.32);
        border-radius: 12px;
        padding: 13px 14px;
        background: rgba(3, 9, 18, 0.72);
        color: var(--text-main);
        font-size: 17px;
        letter-spacing: 0.03em;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      #name-input:focus {
        border-color: rgba(52, 211, 153, 0.95);
        box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.2);
      }

      .name-actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      #start-button {
        width: 100%;
        border: none;
        border-radius: 12px;
        padding: 13px 14px;
        background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
        color: #062013;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.04em;
      }

      #start-button:hover {
        filter: brightness(1.06);
      }

      #start-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #name-error {
        min-height: 18px;
        margin-top: 10px;
        font-size: 13px;
        color: #fda4af;
      }

      @media (max-width: 900px), (max-height: 720px) {
        .name-card {
          width: min(96vw, 420px);
          border-radius: 14px;
          padding: 16px;
        }

        .name-card h1 {
          font-size: 22px;
          margin-bottom: 8px;
        }

        .name-card p {
          font-size: 13px;
          margin-bottom: 12px;
        }

        #name-input {
          font-size: 16px;
          padding: 11px 12px;
        }

        #start-button {
          padding: 11px 12px;
          font-size: 14px;
        }
      }

      @media (max-width: 520px), (max-height: 480px) {
        #name-overlay {
          padding: 6px;
        }

        .name-card {
          width: 100%;
          max-height: 96vh;
          border-radius: 12px;
          padding: 12px;
        }

        .name-card p {
          margin-bottom: 10px;
          line-height: 1.3;
        }

        .name-actions {
          margin-top: 8px;
        }

        #name-input {
          letter-spacing: 0.01em;
        }
      }

      @media (min-width: 1500px) {
        .name-card {
          width: min(40vw, 520px);
        }

        .name-card h1 {
          font-size: 30px;
        }
      }
    </style>
  </head>
  <body>
    <div id="name-overlay">
      <div class="name-card">
        <h1>Force Pit Arena</h1>
        <p>Wachse durch Orbs, lade Kraft auf und stoße kleinere Spieler in den Abgrund.</p>
        <input
          id="name-input"
          type="text"
          maxlength="16"
          placeholder="Dein Spielername"
          autocomplete="nickname"
          autofocus
        />
        <div class="name-actions">
          <button id="start-button" type="button">In die Arena starten</button>
        </div>
        <div id="name-error"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
